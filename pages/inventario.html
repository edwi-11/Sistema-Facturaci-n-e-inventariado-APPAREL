<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario - ApparelWeb</title>
    <link rel="stylesheet" href="../css/Global.css">
    <link rel="stylesheet" href="../css/StyleInventario.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <div id="sideBarContainer"></div>

        <main class="main-content">

            <header class="header">
                <h1>Inventario</h1>
                <p>Administra tus productos y stock</p>
            </header>

            <!-- Stats -->
            <section class="stats-container">
                <div class="stat-card">
                    <div class="stat-icon icon-pink"><i class="fas fa-box"></i></div>
                    <div class="stat-info">
                        <p>Total Productos</p>
                        <h3 id="statTotal">0</h3>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon icon-pink"><i class="fas fa-check"></i></div>
                    <div class="stat-info">
                        <p>En Stock</p>
                        <h3 id="statEnStock">0</h3>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon icon-pink"><i class="fas fa-exclamation"></i></div>
                    <div class="stat-info">
                        <p>Sin Stock</p>
                        <h3 id="statSinStock">0</h3>
                    </div>
                </div>
            </section>

            <!-- Tabla -->
            <section class="content-card">
                <div class="table-actions">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="inputBuscar" placeholder="Buscar producto...">
                    </div>
                    <button class="btn-new" id="btnNuevoProducto">+ Nuevo Producto</button>
                </div>

                <table class="custom-table">
                    <thead>
                        <tr>
                            <th>Código</th>
                            <th>Producto</th>
                            <th>Marca</th>
                            <th>Stock</th>
                            <th>Precio</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaProductos">
                        <tr>
                            <td colspan="7" style="text-align:center;padding:24px">
                                <i class="fas fa-spinner fa-spin"></i> Cargando...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </section>

        </main>
    </div>

    <!-- Modal Crear / Editar -->
    <div id="modalOverlay">
        <div class="modal-card">
            <h2 id="modalTitulo">Nuevo Producto</h2>
            <input type="hidden" id="productoId">
            <div class="modal-fields">
                <input type="text"   id="inputNombre"      placeholder="Nombre"/>
                <input type="text"   id="inputDescripcion" placeholder="Descripción"/>
                <input type="text"   id="inputTalla"       placeholder="Talla"/>
                <input type="text"   id="inputMarca"       placeholder="Marca"/>
                <input type="number" id="inputPrecio"      placeholder="Precio"/>
                <input type="number" id="inputStock"       placeholder="Stock inicial"/>
                <select id="inputEstado">
                    <option value="1">En Stock</option>
                    <option value="0">Sin Stock</option>
                </select>
            </div>
            <div class="modal-actions">
                <button id="btnCancelarModal">Cancelar</button>
                <button id="btnGuardarModal">Guardar</button>
            </div>
        </div>
    </div>

    <script src="../js/SideBar.js"></script>
    <script type="module" src="../js/inventario.js"></script>
</body>
</html>
