<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva Venta</title>

    <link rel="stylesheet" href="../css/StyleFac.css">
    <link rel="stylesheet" href="../css/Global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    
</head>

<body>

<div id="sideBarContainer"></div>

<div class="principal">

    <div class="content-header">
        <h2>Nueva Venta</h2>
    </div>

    <!-- CONTENEDOR SUPERIOR: Cliente + Factura -->
    <div class="Contenedor1">

        <!-- TARJETA CLIENTE -->
        <div class="Clientes">
            <div class="icon-title"><i class="fa fa-user"></i></div>
            <h3>Cliente</h3>

            <div class="inputgrupo">
                <label for="telefonoCliente">Teléfono</label>
                <div class="input-row">
                    <input id="telefonoCliente" type="text" placeholder="Buscar por teléfono">
                    <button class="add-btn" id="btnNuevoCliente" title="Nuevo cliente">
                        <i class="fa fa-user-plus"></i>
                    </button>
                </div>
            </div>

            <div class="inputgrupo">
                <label for="nombreCliente">Nombre</label>
                <input id="nombreCliente" type="text" placeholder="Nombre del cliente" readonly>
            </div>

            <div class="inputgrupo">
                <label for="descuentoCliente">Descuento (%)</label>
                <input id="descuentoCliente" type="text" placeholder="0" readonly>
            </div>
        </div>

        <!-- TARJETA FACTURA -->
        <div class="Factura">
            <div class="icon-title"><i class="fa fa-file-invoice"></i></div>
            <h3>Datos de Factura</h3>

            <div class="fechas">
                <div class="inputgrupo">
                    <label for="fechaVenta">Fecha</label>
                    <input id="fechaVenta" type="date">
                </div>
                <div class="inputgrupo">
                    <label for="noFactura">No. Factura</label>
                    <input id="noFactura" type="text" placeholder="001-001-0001" readonly>
                </div>
            </div>
        </div>

    </div>

    <!-- CONTENEDOR INFERIOR: Tabla de productos + totales -->
    <div class="Contenedor2">
        <div class="icon-title"><i class="fa fa-box"></i></div>
        <h3>Productos</h3>

        <table class="Facturacion">
            <thead>
                <tr>
                    <th>Código</th>
                    <th>Producto</th>
                    <th>Cant.</th>
                    <th>Precio</th>
                    <th>Total</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="tablaProductos"></tbody>
        </table>

        <button class="add-row-btn" id="btnAgregarProducto">
            <i class="fa fa-plus"></i> Agregar producto
        </button>

        <!-- Totales -->
        <div class="Totales-Seccion">
            <div class="total-item">
                <label>Subtotal:</label>
                <input type="text" id="subtotalVenta" readonly value="0.00">
            </div>
            <div class="total-item">
                <label>Descuento:</label>
                <input type="text" id="descuentoVenta" readonly value="0.00">
            </div>
            <div class="total-item">
                <label><strong>Total:</strong></label>
                <input type="text" id="totalVenta" readonly value="0.00">
            </div>

            <div class="acciones">
                <button class="save-btn" id="btnGuardarVenta">
                    <i class="fa fa-save"></i> Guardar
                </button>
                <button class="print-btn" id="btnImprimir">
                    <i class="fa fa-print"></i> Imprimir
                </button>
                <button class="cancel-btn" id="btnCancelar">
                    Cancelar
                </button>
            </div>
        </div>
    </div>

</div>

<!-- MODAL CONFIRMAR GUARDAR -->
<div id="modalConfirmar" class="modal hidden">
    <div class="modal-content">
        <h3><i class="fa fa-question-circle" style="color:#f06292"></i> Confirmar venta</h3>
        <p>¿Deseas guardar esta venta?</p>
        <div class="modal-actions">
            <button class="cancel-btn" id="btnNo">No</button>
            <button class="save-btn" id="btnSi">Sí, guardar</button>
        </div>
    </div>
</div>

<!-- MODAL BUSCAR PRODUCTOS -->
<div id="modalProductos" class="modal hidden">
    <div class="modal-content" style="min-width: 420px;">
        <h3><i class="fa fa-search" style="color:#f06292"></i> Buscar producto</h3>
        <input id="buscarProducto" type="text" placeholder="Buscar por código o nombre...">
        <div id="listaProductos" style="max-height: 300px; overflow-y: auto; margin-top: 10px;"></div>
        <div class="modal-actions">
            <button class="cancel-btn" id="cerrarProductos">Cerrar</button>
        </div>
    </div>
</div>

<!-- MODAL NUEVO CLIENTE -->
<div id="modalNuevoCliente" class="modal hidden">
    <div class="modal-content">
        <h3><i class="fa fa-user-plus" style="color:#f06292"></i> Nuevo Cliente</h3>

        <div class="inputgrupo">
            <label>Nombre</label>
            <input id="ncNombre" type="text" placeholder="Nombre">
        </div>
        <div class="inputgrupo">
            <label>Apellido</label>
            <input id="ncApellido" type="text" placeholder="Apellido">
        </div>
        <div class="inputgrupo">
            <label>Teléfono</label>
            <input id="ncTelefono" type="number" placeholder="Teléfono">
        </div>
        <div class="inputgrupo">
            <label>Cédula</label>
            <input id="ncCedula" type="text" placeholder="Cédula">
        </div>

        <div class="modal-actions">
            <button class="cancel-btn" id="btnCancelarCliente">Cancelar</button>
            <button class="save-btn"   id="btnGuardarCliente">Guardar</button>
        </div>
    </div>
</div>

<script src="../js/SideBar.js"></script>
<script type="module" src="../js/ventas.js"></script>


</body>
</html>
