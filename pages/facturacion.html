<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facturación</title>
    <link rel="stylesheet" href="../css/StyleFac.css">
    <link rel="stylesheet" href="../css/Global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <div id="sideBarContainer"></div>
    
    <div class="principal">
        <header class="content-header">
            <h2>Facturación / Nueva factura</h2>
            <p>Aquí puedes gestionar tus facturas, crear nuevas y generar reportes.</p>
        </header>

        <div class="Contenedor1">
            <!-- SECCIÓN CLIENTES -->
            <div class="Clientes">
                <i class="fa-solid fa-users icon-title"></i>
                <h3>Datos del Cliente</h3>

                <div class="inputgrupo">
                    <label for="Cliente">Cliente</label>
                    <div class="input-row">
                        <select name="Cliente">
                            <option value="">Seleccionar cliente</option>
                            <option value="1">Juan Pérez</option>
                            <option value="2">María García</option>
                        </select>
                        <button class="add-btn"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>

                <div class="inputgrupo">
                    <label for="NombreCliente">Nombre Completo</label>
                    <input name="NombreCliente" type="text" placeholder="Nombre del cliente" readonly>
                </div>
            </div>

            <!-- SECCIÓN DETALLES FACTURA -->
            <div class="Factura">
                <i class="fa-solid fa-file-invoice icon-title"></i>
                <h3>Detalles de la Factura</h3>
                
                <div class="inputgrupo">
                    <label>Número de Factura</label>
                    <input type="text" value="FAC-001" readonly>
                </div>

                <div class="inputgrupo">
                    <label>Fecha</label>
                    <input type="date" value="2024-06-01">
                </div>

                <div class="inputgrupo">
                    <label>Vencimiento</label>
                    <input type="date" value="2024-06-15">
                </div>
            </div>
        </div>

        <!-- TABLA DE PRODUCTOS -->
        <div class="Contenedor2">
            <h3>Detalle de Productos</h3>
            <table class="Facturacion">
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Producto</th>
                        <th>Cant.</th>
                        <th>Precio</th>
                        <th>Total</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><input type="text" placeholder="Código del producto"></td> </td>
                        <td><input type="text" placeholder="Descripción" readonly></td>
                        <td><input type="number" value="1" min="1"></td>
                        <td><input type="number" placeholder="0.00" step="0.01"></td>
                        <td><input type="number" placeholder="0.00" readonly></td>
                        <td><button class="delete-btn"><i class="fa-solid fa-trash"></i></button></td>
                    </tr>
                </tbody>
            </table>

            <button class="add-row-btn">+ Agregar Producto</button>

            <div class="Totales-Seccion">
                <div class="resumen">
                    <div class="total-item">
                        <span>Subtotal:</span>
                        <input type="number" placeholder="0.00" readonly>
                    </div>
                    <div class="total-item total-final">
                        <span>Total a pagar:</span>
                        <input type="number" placeholder="0.00" readonly>
                    </div>
                </div>

                <div class="acciones">
                    <button class="save-btn">Guardar</button>
                    <button class="print-btn">Imprimir</button>
                    <button class="cancel-btn">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/SideBar.js"></script>
</body>
</html>
