<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Clientes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/Global.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div id="sideBarContainer"></div>

<div class="main-container">
    <header class="Bienvenida">
        <h2>Clientes</h2>
    </header>

    <div class="stats-container">
        <div class="stat-card">
            <div class="stat-icon">
                <i class="fa-solid fa-users"></i>
            </div>
            <div class="stat-info">
                <h2 id="totalClientes">0</h2>
                <p>Total Clientes</p>
            </div>
        </div>
    </div>

    <div class="main-card">
        <div class="top-section">
            <h1 class="title">Clientes</h1>
            <button class="btn-add-client" id="btnNuevoCliente">
                <i class="fa-solid fa-plus"></i> Nuevo Cliente
            </button>
        </div>

        <div class="search-wrapper">
            <div class="search-group">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="inputBuscar" placeholder="Buscar cliente...">
            </div>
        </div>

        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Nombre Completo</th>
                        <th>Teléfono</th>
                        <th>Cédula</th>
                        <th>Número de Compra</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaClientes">
                    <tr><td colspan="4" style="text-align:center">Cargando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h2 id="modalTitulo">Nuevo Cliente</h2>
        <div class="modal-fields">
            <input type="hidden" id="clienteId">
            <input type="text" id="inputNombre" placeholder="Nombre">
            <input type="text" id="inputApellido" placeholder="Apellido">
            <input type="number" id="inputTelefono" placeholder="Número de Teléfono">
            <input type="text" id="inputCedula" placeholder="Cédula">
            <input type="number" id="inputNumeroCompra" placeholder="Número de Compra (opcional)">
        </div>
        <div class="modal-actions">
            <button class="btn-cancelar-modal" id="btnCancelar">Cancelar</button>
            <button class="btn-guardar-modal" id="btnGuardar">Guardar</button>
        </div>
    </div>
</div>

<script src="../js/SideBar.js"></script>
<script type="module" src="../js/cliente.js"></script>
</body>
</html>
