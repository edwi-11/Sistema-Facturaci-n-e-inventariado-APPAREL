<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/Global.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div id="sideBarContainer"></div>

<div class="main-container">

    <header class="Bienvenida">
        <h2>Usuarios</h2>
    </header>

    <div class="stats-container">
        <div class="stat-card">
            <div class="stat-icon">
                <i class="fa-solid fa-users"></i>
            </div>
            <div class="stat-info">
                <h2 id="statTotal">--</h2>
                <p>Total Usuarios</p>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon active">
                <i class="fa-solid fa-user-check"></i>
            </div>
            <div class="stat-info">
                <h2 id="statAdmins">--</h2>
                <p>Administradores</p>
            </div>
        </div>
    </div>

    <div class="main-card">
        <div class="top-section">
            <h1 class="title">Usuarios</h1>
            <button class="btn-add-client" id="btnNuevoUsuario">
                <i class="fa-solid fa-plus"></i> Nuevo Usuario
            </button>
        </div>

        <div class="search-wrapper">
            <div class="search-group">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="inputBuscar" placeholder="Buscar Usuario...">
            </div>
        </div>

        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Cédula</th>
                        <th>Usuario</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaUsuarios">
                    <tr>
                        <td colspan="4" style="text-align:center;color:#aaa;padding:24px">
                            <i class="fa-solid fa-spinner fa-spin"></i> Cargando...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="pagination-footer" id="paginacion"></div>
    </div>
</div>

<div id="modalOverlay" class="hidden">
    <div class="modal-card">
        <h2 id="modalTitulo">Nuevo Usuario</h2>
        <input type="hidden" id="u-cod">
        <div class="modal-fields">
            <input id="u-nombre"    placeholder="Nombre"/>
            <input id="u-apellidos" placeholder="Apellidos"/>
            <input id="u-cedula"    placeholder="Cédula"/>
            <input id="u-login"     placeholder="Usuario Login"/>
            <select id="u-codrol">
                <option value="1">Administrador</option>
                <option value="2" selected>Usuario</option>
            </select>
            <select id="u-estado">
                <option value="1" selected>Activo</option>
                <option value="0">Inactivo</option>
            </select>
            <input id="u-password" placeholder="Contraseña" type="password"/>
        </div>
        <div class="modal-actions">
            <button id="btnCancelarModal">Cancelar</button>
            <button id="btnGuardarModal">Agregar</button>
        </div>
    </div>
</div>

<script src="../js/SideBar.js"></script>
<script src="../js/usuarios.js"></script>
</body>
</html>
