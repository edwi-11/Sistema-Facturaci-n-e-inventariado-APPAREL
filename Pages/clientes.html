<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Clientes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../Css/Global.css">
    <link rel="stylesheet" href="../Css/styles.css">
</head>
<body>
<div id="sideBarContainer"></div>
<div class="main-container">
    <div class="badge-header">Clientes</div>
    
    <div class="main-card">
        <div class="top-section">
            <h1 class="title">Clientes</h1>
            <button class="btn-add-client">
                <i class="fa-solid fa-plus"></i> Nuevo Cliente
            </button>
        </div>

        <div class="search-wrapper">
            <div class="search-group">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Buscar cliente...">
            </div>
        </div>

        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Teléfono</th>
                        <th>Correo</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Juan Pérez</td>
                        <td>9999-1111</td>
                        <td>juan@email.com</td>
                        <td class="action-cells">
                            <button class="btn-icon btn-edit"><i class="fa-solid fa-pencil"></i></button>
                            <button class="btn-icon btn-delete"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    </tr>
                    <tr>
                        <td>María López</td>
                        <td>8888-2222</td>
                        <td>maria@email.com</td>
                        <td class="action-cells">
                            <button class="btn-icon btn-edit"><i class="fa-solid fa-pencil"></i></button>
                            <button class="btn-icon btn-delete"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    </tr>
                    <tr>
                        <td>Carlos Gómez</td>
                        <td>7777-3333</td>
                        <td>carlos@email.com</td>
                        <td class="action-cells">
                            <button class="btn-icon btn-edit"><i class="fa-solid fa-pencil"></i></button>
                            <button class="btn-icon btn-delete"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    </tr>
                    <tr>
                        <td>Ana Martínez</td>
                        <td>6666-4444</td>
                        <td>ana@email.com</td>
                        <td class="action-cells">
                            <button class="btn-icon btn-edit"><i class="fa-solid fa-pencil"></i></button>
                            <button class="btn-icon btn-delete"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="pagination-footer">
            <button class="page-arrow">«</button>
            <button class="page-number active">1</button>
            <button class="page-number">2</button>
            <button class="page-number">3</button>
            <button class="page-arrow">»</button>
        </div>
    </div>
</div>
<script src="../js/SideBar.js"></script>
</body>
</html>
